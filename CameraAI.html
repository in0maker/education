<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamerayla Tonton'u Eğit</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #e0f2f1; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #00796b; font-size: 22px; }
        #webcam-container { margin: 20px 0; border: 4px solid #333; border-radius: 10px; overflow: hidden; display: inline-block; }
        #robot-status { font-size: 70px; margin: 15px 0; }
        .target-box { background: #fff9c4; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-bottom: 10px; }
        #btn-start { background: #00796b; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kamerayı Aç ve Tonton'a Kartı Göster! 🤖📸</h1>
    <p>Önce "Kamerayı Başlat" butonuna bas ve izin ver.</p>
    
    <button id="btn-start" onclick="init()">Kamerayı Başlat 🎬</button>
    
    <div id="webcam-container"></div>
    
    <div class="target-box" id="task-text">Tonton'un İstediği Hava: ☀️ GÜNEŞLİ</div>
    <div id="robot-status">🤖🧠</div>
    <div id="label-container" style="font-weight: bold; color: #555;">Kameradan gelen veri bekleniyor...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ⚠️ Teachable Machine'den aldığın linki buraya yapıştıracaksın:
    const URL = "https://teachablemachine.withgoogle.com/models/ws0dmFv3O/"; 

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('label-container').innerHTML = "Yapay zeka modeli yükleniyor... ⏳";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // Modeli yüklüyoruz
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // Kamerayı kuruyoruz (Genişlik: 300, Yükseklik: 300)
        const flip = true; 
        webcam = new tmImage.Webcam(300, 300, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Kamerayı ekrana basıyoruz
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    // Kameradaki görüntüyü yapay zekaya tahmin ettirme
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // En yüksek tahmin oranına sahip sınıfı buluyoruz
        let highestPrediction = { className: "", probability: 0 };
        for (let i = 0; i < maxPredictions; i++) {
            if(prediction[i].probability > highestPrediction.probability) {
                highestPrediction = prediction[i];
            }
        }

        // Eğer yapay zeka %85'ten yüksek bir oranla kartı tanıdıysa:
        if(highestPrediction.probability > 0.85) {
            labelContainer.innerHTML = "Gördüğüm: " + highestPrediction.className;
            
            // Oyun mantığı kontrolü (Örnek: Güneşli havada Güneş kartı gösterildi mi?)
            if(highestPrediction.className === "Gunes") {
                document.getElementById('robot-status').textContent = "🕶️🤖👍";
                document.getElementById('label-container').innerHTML = "Harika! Güneş'i tanıdım ve gözlüğü taktım! 😎";
            }
        }
    }
</script>
</body>
</html>
