<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka: Akıllı Kapı Ses Tanıma</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .info-text { color: #7f8c8d; font-size: 15px; margin-top: 0; }
        
        .progress-bar-container {
            background: #dfe6e9;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #9b59b6;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Kapı ve Kulak Tasarımı */
        .door-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            position: relative;
        }
        .door {
            width: 160px;
            height: 240px;
            background-color: #cd6133;
            border: 6px solid #b33939;
            border-radius: 15px 15px 0 0;
            position: relative;
            transition: transform 0.8s ease-in-out, background-color 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .door-knob {
            width: 20px;
            height: 20px;
            background: #f1c40f;
            border-radius: 50%;
            position: absolute;
            right: 15px;
            top: 50%;
        }
        .door-eye {
            width: 40px;
            height: 40px;
            background: #34495e;
            border: 4px solid #fff;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        
        /* Yapay Zekanın Akıllı Kulağı */
        .ai-ear {
            width: 70px;
            height: 70px;
            background: #9b59b6;
            border: 4px dashed #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            margin-left: 30px;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
            transition: all 0.3s;
        }
        .ai-ear.hovered {
            transform: scale(1.2);
            background: #8e44ad;
            border-color: #2ecc71;
        }

        /* Ses Dalgaları Alanı */
        .sound-zone {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 90px;
        }
        .sound-wave {
            background: #fff;
            border: 3px solid #3498db;
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            position: relative;
        }
        .sound-wave span { font-size: 11px; font-weight: bold; color: #34495e; }
        .sound-wave:active { cursor: grabbing; }

        /* Durum Bildirim Paneli */
        .status-panel {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .success-bg { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error-bg { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* Kapı Açılma Animasyonu */
        .door-open {
            transform: perspective(1200px) rotateY(-105deg);
            transform-origin: left;
            background-color: #7f8c8d;
            box-shadow: 15px 15px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🎧 Ses Tanıyan Akıllı Kapı: AI Eğitimi 🚪</h1>
        <p class="info-text">Sesleri yapay zekanın mor kulağına sürükle. Ona ev sahibinin (Canavar) sesini öğret!</p>
        
        <div class="progress-bar-container">
            <div id="progress" class="progress-fill"></div>
        </div>

        <div class="door-area">
            <div class="door" id="main-door">
                <div class="door-eye" id="door-eye">🤖</div>
                <div class="door-knob"></div>
            </div>
            <div class="ai-ear" id="ai-ear">👂</div>
        </div>

        <div class="sound-zone" id="sound-zone">
            <div class="sound-wave" id="sound-monster" draggable="true" data-sound="canavar">👹<span>Kükreme</span></div>
            <div class="sound-wave" id="sound-cat" draggable="true" data-sound="kedi">🐱<span>Miyav</span></div>
            <div class="sound-wave" id="sound-bird" draggable="true" data-sound="kus">🐦<span>Cik Cik</span></div>
        </div>

        <div id="status-text" class="status-panel">🤖 Kulak hazır! Lütfen bana sesleri dinleterek eğit.</div>
    </div>

    <script>
        // GERÇEK SES MOTORU BULUT BAĞLANTILARI
        const audioMonster = new Audio('https://actions.google.com/sounds/v1/creatures/monster_growl.ogg');
        const audioCat = new Audio('https://actions.google.com/sounds/v1/animals/cat_meow.ogg');
        const audioBird = new Audio('https://actions.google.com/sounds/v1/animals/bird_chirp.ogg');
        const audioDoorOpen = new Audio('https://actions.google.com/sounds/v1/doors/creaky_door_open.ogg');
        const audioAccessDenied = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');

        function playSound(type) {
            // Seslerin üst üste binip bozulmaması için önce sıfırlıyoruz
            audioMonster.pause(); audioMonster.currentTime = 0;
            audioCat.pause(); audioCat.currentTime = 0;
            audioBird.pause(); audioBird.currentTime = 0;
            
            if (type === 'canavar') audioMonster.play();
            if (type === 'kedi') audioCat.play();
            if (type === 'kus') audioBird.play();
            if (type === 'kapi_ac') audioDoorOpen.play();
            if (type === 'reddedildi') audioAccessDenied.play();
        }

        const requiredTries = 6;
        let trainedCount = 0;

        const testGuests = [
            { name: "Küçük Kedi 🐱", sound: "kedi", msg: "Miyav! Ben komşu kedi, süt istemeye geldim." },
            { name: "Korkunç Canavar 👹", sound: "canavar", msg: "WRAAAR! Ben ev sahibiyim, kapıyı aç!" },
            { name: "Minik Kuş 🐦", sound: "kus", msg: "Cik cik! Çatıda yuva yapmaya geldim." },
            { name: "Yabancı Canavar 👹", sound: "canavar", msg: "ROAAAR! Eve girmek istiyorum!" }
        ];
        let testIndex = 0;

        const sounds = document.querySelectorAll('.sound-wave');
        const ear = document.getElementById('ai-ear');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const door = document.getElementById('main-door');
        const doorEye = document.getElementById('door-eye');
        const soundZone = document.getElementById('sound-zone');

        // Masaüstü Sürükle Bırak Olayları
        sounds.forEach(sound => {
            sound.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
            });
            // Tıklayınca da ses çıksın (5 yaş grubu için kolaylık)
            sound.addEventListener('click', (e) => {
                const soundType = e.currentTarget.dataset.sound;
                playSound(soundType);
            });
        });

        ear.addEventListener('dragover', (e) => e.preventDefault());
        ear.addEventListener('dragenter', () => ear.classList.add('hovered'));
        ear.addEventListener('dragleave', () => ear.classList.remove('hovered'));
        
        ear.addEventListener('drop', (e) => {
            ear.classList.remove('hovered');
            const draggedId = e.dataTransfer.getData('text/plain');
            const draggedElement = document.getElementById(draggedId);
            if (!draggedElement) return;
            const soundType = draggedElement.dataset.sound;

            processAudioTraining(soundType, draggedElement.innerText.substring(0,2));
        });

        function processAudioTraining(type, emoji) {
            if(trainedCount >= requiredTries) return;

            playSound(type); // Sürükleyip bırakınca ses çıkar
            trainedCount++;
            let percent = (trainedCount / requiredTries) * 100;
            progress.style.width = percent + "%";

            statusText.innerHTML = `🎵 Yapay Zeka ${emoji} ses dalgasını analiz etti ve hafızaya kaydetti!`;
            
            ear.style.transform = "scale(1.3)";
            setTimeout(() => ear.style.transform = "scale(1)", 200);

            if (trainedCount === requiredTries) {
                startAITestPhase();
            }
        }

        function startAITestPhase() {
            soundZone.style.display = "none";
            statusText.className = "status-panel success-bg";
            statusText.innerHTML = `
                <p>🎉 YAPAY ZEKA SES TANIMA MODELİ %100 EĞİTİLDİ!</p>
                <p>Şimdi kapıya gizemli misafirler gelecek ve yapay zeka seslerinden kim olduklarını bulacak.</p>
                <button id="ai-start-btn" style="padding:12px 24px; font-size:16px; font-weight:bold; background:#9b59b6; color:white; border:none; border-radius:8px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">Akıllı Sistemi Devreye Al 🚀</button>
            `;

            document.getElementById('ai-start-btn').addEventListener('click', runAIEarEngine);
        }

        function runAIEarEngine() {
            if (testIndex < testGuests.length) {
                door.classList.remove('door-open');
                door.style.backgroundColor = "#cd6133";
                doorEye.innerText = "🤖";
                
                const guest = testGuests[testIndex];
                statusText.className = "status-panel";
                statusText.innerHTML = `<p>🚪 Kapıya biri yaklaştı ve ses çıkardı...</p> <h2 style='margin:5px 0; color:#e67e22;'>"${guest.msg}"</h2>`;
                
                // Kapıya gelen misafir kendi sesini otomatik çıkarır
                setTimeout(() => { playSound(guest.sound); }, 300);

                // Kulak dinleme animasyonu
                let blink = setInterval(() => {
                    ear.style.background = ear.style.background === 'rgb(46, 204, 113)' ? '#9b59b6' : '#2ecc71';
                    doorEye.innerText = "⚡";
                }, 300);

                setTimeout(() => {
                    clearInterval(blink);
                    ear.style.background = '#9b59b6';
                    makeAIDecision(guest);
                }, 2500);

            } else {
                statusText.className = "status-panel success-bg";
                statusText.innerHTML = "🎯 <strong>MUHTEŞEM!</strong> Akıllı kapı tüm sesleri doğru analiz etti. Güvenli bir AI modeli eğittin!";
                doorEye.innerText = "😎";
            }
        }

        function makeAIDecision(guest) {
            if (guest.sound === 'canavar') {
                statusText.className = "status-panel success-bg";
                statusText.innerHTML = `<h3>🎯 AI Kararı: SES TANINDI!</h3><p>Bu ses <strong>Ev Sahibine (Canavar)</strong> ait. Giriş onaylandı!</p>`;
                door.style.backgroundColor = "#2ecc71";
                doorEye.innerText = "👁️";
                
                setTimeout(() => {
                    playSound('kapi_ac'); // Kapı açılma ses efekti
                    door.classList.add('door-open');
                    setTimeout(nextGuestTrigger, 3000);
                }, 500);

            } else {
                statusText.className = "status-panel error-bg";
                statusText.innerHTML = `<h3>❌ AI Kararı: ERİŞİM ENGELLENDİ!</h3><p>Bu bir <strong>${guest.sound.toUpperCase()}</strong> sesi. Güvenlik nedeniyle kapı kapalı kaldı!</p>`;
                door.style.backgroundColor = "#e74c3c";
                doorEye.innerText = "😡";
                playSound('reddedildi'); // Hata uyarı ses efekti
                
                door.style.transform = "translateX(-10px)";
                setTimeout(() => door.style.transform = "translateX(10px)", 100);
                setTimeout(() => door.style.transform = "translateX(0)", 200);

                setTimeout(nextGuestTrigger, 3500);
            }
        }

        function nextGuestTrigger() {
            testIndex++;
            runAIEarEngine();
        }
    </script>
</body>
</html>
