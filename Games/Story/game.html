<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesli ve Görsel Emoji Masal Sihirbazı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .game-container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            margin: 10px;
        }
        h1 { color: #e65100; font-size: 28px; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .info-text { color: #5d4037; font-size: 16px; margin-bottom: 20px; font-weight: bold; }

        /* Oyun Alanı Düzeni */
        .main-layout {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            align-items: stretch;
        }

        /* Sol Panel: Seçim Butonları */
        .selection-panel {
            width: 35%;
            background: #fffde7;
            padding: 15px;
            border-radius: 20px;
            border: 3px dashed #ffb74d;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-title { font-size: 12px; font-weight: bold; color: #e65100; text-align: left; }
        .emoji-group { display: flex; gap: 10px; justify-content: start; }
        
        .emoji-btn {
            font-size: 36px;
            width: 65px;
            height: 65px;
            background: white;
            border: 3px solid #ffe082;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .emoji-btn:hover { transform: scale(1.1); border-color: #ffb74d; background: #fff8e1; }
        .emoji-btn.selected { border-color: #e65100; background: #ffe082; box-shadow: 0 0 10px #ffb74d; }

        /* Sağ Panel: Yapay Zeka Görsel Üretim Sahnesi (Ekran) */
        .ai-screen-panel {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* Yapay Zekanın Çizeceği Canlı Görsel Sahne */
        .ai-canvas {
            height: 250px;
            background: #eceff1;
            border-radius: 20px;
            border: 4px solid #dbdbdb;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }
        
        /* Sahne İçi Dinamik Katmanlar (Görseller) */
        .canvas-bg-layer { width: 100%; height: 100%; position: absolute; top:0; left:0; transition: all 0.8s ease; z-index: 1; }
        .canvas-actor { font-size: 85px; position: absolute; bottom: 20px; left: 20%; z-index: 3; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: none; }
        .canvas-vehicle { font-size: 65px; position: absolute; bottom: 40px; right: 20%; z-index: 2; transition: all 0.8s ease; display: none; }
        
        /* Sahne Arka Plan Renk/Desen Tanımlamaları */
        .bg-castle { background: linear-gradient(to top, #b0bec5, #eceff1); background-image: radial-gradient(circle, #cfd8dc 20%, transparent 20%); background-size: 20px 20px; }
        .bg-space { background: linear-gradient(to top, #0d47a1, #000428); }
        .bg-forest { background: linear-gradient(to top, #2e7d32, #a5d6a7); }
        
        /* Düşünme Efekti */
        .ai-loading-text { font-size: 50px; z-index: 4; display: none; animation: spin 1s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Alt Panel: Sesli Hikaye Kutusu */
        .story-player-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #ffb74d;
            background: #fffde7;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .story-text { font-family: 'Georgia', serif; font-size: 20px; color: #5d4037; line-height: 1.6; font-weight: bold; }
        
        .audio-wave {
            display: none;
            gap: 4px;
            margin-top: 10px;
        }
        .bar { width: 4px; height: 15px; background: #e65100; animation: bounce 0.5s ease-in-out infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes bounce { 100% { height: 5px; } }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🧙‍♂️ AI Çizgi Film ve Masal Fabrikası 🎬</h1>
        <p class="info-text">Her sıradan birer tane seç, yapay zeka hem resmini çizsin hem sesli okusun!</p>

        <div class="main-layout">
            <div class="selection-panel">
                <div class="section-title">🦖 1. KAHRAMANINI SEÇ</div>
                <div class="emoji-group">
                    <button class="emoji-btn" onclick="selectEmoji('kahraman', '🦖', this)">🦖</button>
                    <button class="emoji-btn" onclick="selectEmoji('kahraman', '🧑‍🚀', this)">🧑‍🚀</button>
                    <button class="emoji-btn" onclick="selectEmoji('kahraman', '🐱', this)">🐱</button>
                </div>

                <div class="section-title">🏰 2. MASAL DÜNYASINI SEÇ</div>
                <div class="emoji-group">
                    <button class="emoji-btn" onclick="selectEmoji('mekan', '🏰', this)">🏰</button>
                    <button class="emoji-btn" onclick="selectEmoji('mekan', '🌌', this)">🌌</button>
                    <button class="emoji-btn" onclick="selectEmoji('mekan', '🌲', this)">🌲</button>
                </div>

                <div class="section-title">🚀 3. ULAŞIM ARACINI SEÇ</div>
                <div class="emoji-group">
                    <button class="emoji-btn" onclick="selectEmoji('arac', '🚀', this)">🚀</button>
                    <button class="emoji-btn" onclick="selectEmoji('arac', '🧹', this)">🧹</button>
                    <button class="emoji-btn" onclick="selectEmoji('arac', '🎈', this)">🎈</button>
                </div>
            </div>

            <div class="ai-screen-panel">
                <div class="ai-canvas" id="ai-canvas">
                    <div class="ai-loading-text" id="ai-loading">🔮</div>
                    <div class="canvas-bg-layer" id="bg-layer"></div>
                    <div class="canvas-actor" id="actor-layer"></div>
                    <div class="canvas-vehicle" id="vehicle-layer"></div>
                    <div id="default-screen-text" style="color:#78909c; font-weight:bold; z-index:2;">Yapıtınız Burada Canlanacak...</div>
                </div>

                <div class="story-player-box">
                    <div class="story-text" id="story-text">Lütfen sol taraftan 3 adet emoji seçerek yapay zekayı tetikleyin!</div>
                    <div class="audio-wave" id="audio-wave">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let choiceHero = "", choicePlace = "", choiceVehicle = "";

        function selectEmoji(category, emoji, element) {
            // İlgili kategorideki diğer butonların aktifliğini kaldır
            const siblings = element.parentElement.querySelectorAll('.emoji-btn');
            siblings.forEach(btn => btn.classList.remove('selected'));
            
            // Seçilen butonu aktifleştir
            element.classList.add('selected');

            if (category === 'kahraman') choiceHero = emoji;
            if (category === 'mekan') choicePlace = emoji;
            if (category === 'arac') choiceVehicle = emoji;

            // Eğer 3 seçim de tamamlandıysa Yapay Zeka jeneratörünü çalıştır
            if (choiceHero && choicePlace && choiceVehicle) {
                triggerAiGenerator();
            }
        }

        function triggerAiGenerator() {
            // Ekranı temizle ve yükleniyor moduna al
            document.getElementById('default-screen-text').style.display = "none";
            document.getElementById('actor-layer').style.display = "none";
            document.getElementById('vehicle-layer').style.display = "none";
            document.getElementById('bg-layer').className = "canvas-bg-layer";
            document.getElementById('ai-loading').style.display = "block";
            document.getElementById('audio-wave').style.style = "none";
            window.speechSynthesis.cancel(); // Önceki ses varsa sustur

            document.getElementById('story-text').innerText = "🤖 Yapay Zeka resmi çiziyor ve hikayeyi seslendiriyor...";

            // Yapay zekanın resmi boyaması ve düşünmesi için 2 saniye süre (Görsel Simülasyon)
            setTimeout(() => {
                document.getElementById('ai-loading').style.display = "none";

                // 1. AŞAMA: YAPAY ZEKA GÖRSELİ OLUŞTURUYOR (Dinamik Resim Çizimi)
                const bgLayer = document.getElementById('bg-layer');
                const actorLayer = document.getElementById('actor-layer');
                const vehicleLayer = document.getElementById('vehicle-layer');

                // Arka plan resmini/rengini ata
                if (choicePlace === "🏰") bgLayer.classList.add('bg-castle');
                if (choicePlace === "🌌") bgLayer.classList.add('bg-space');
                if (choicePlace === "🌲") bgLayer.classList.add('bg-forest');

                // Karakter ve araçları ekrana yerleştir ve canlandır
                actorLayer.innerText = choiceHero;
                actorLayer.style.display = "block";

                vehicleLayer.innerText = choiceVehicle;
                vehicleLayer.style.display = "block";

                // Animasyon tetikleme (Örn: Araçlar ve karakterler havada süzülür gibi yapar)
                if(choiceVehicle === '🚀') {
                    vehicleLayer.style.bottom = "120px";
                    actorLayer.style.bottom = "110px"; // Karakter rokete bindi
                    actorLayer.style.left = "55%";
                } else {
                    actorLayer.style.bottom = "20px";
                    actorLayer.style.left = "20% ";
                    vehicleLayer.style.bottom = "30px";
                }

                // 2. AŞAMA: YAPAY ZEKA METNİ (LLM) TÜRETİYOR
                let generatedStory = "";
                if (choiceHero === "🦖" && choicePlace === "🏰" && choiceVehicle === "🚀") {
                    generatedStory = "Dinozor Rex, roketine atlayıp çikolata şatosuna uçtu ve orada tatlı bir parti verdi!";
                } else if (choiceHero === "🧑‍🚀" && choicePlace === "🌌" && choiceVehicle === "🎈") {
                    generatedStory = "Astronot Ayça, renkli balonlarıyla uzay boşluğuna süzüldü ve yıldızlara dokundu.";
                } else if (choiceHero === "🐱" && choicePlace === "🌲" && choiceVehicle === "🧹") {
                    generatedStory = "Yaramaz kedi, sihirli süpürgesiyle büyük ormanın üzerinde uçarak kuşlarla yarıştı.";
                } else {
                    generatedStory = `Sevimli ${choiceHero}, hemen ${choiceVehicle} aracına bindi ve neşeyle ${choicePlace} dünyasına doğru harika bir maceraya çıktı.`;
                }

                document.getElementById('story-text').innerText = generatedStory;

                // 3. AŞAMA: YAPAY ZEKA MASALI SESLENDİRİYOR (Text-To-Speech)
                speakStory(generatedStory);

            }, 2000);
        }

        function speakStory(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR'; // Türkçe ses motoru ayarı
                utterance.rate = 0.9;     // Çocukların rahat anlaması için biraz yavaş okuma

                // Ses dalgası animasyonunu başlat
                utterance.onstart = () => {
                    document.getElementById('audio-wave').style.display = 'flex';
                };

                // Konuşma bittiğinde animasyonu durdur
                utterance.onend = () => {
                    document.getElementById('audio-wave').style.display = 'none';
                };

                window.speechSynthesis.speak(utterance);
            } else {
                console.log("Tarayıcı ses desteklemiyor.");
            }
        }
    </script>
</body>
</html>
